<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Conductor</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #061a33;
      color: #111827;
    }

    .hero {
      padding: 36px 18px 78px;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #002b5b, #00509d, #ff9f1c);
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .hero p {
      margin: 0;
      font-size: 15px;
      opacity: 0.95;
    }

    .contenedor {
      max-width: 430px;
      margin: -55px auto 35px;
      padding: 0 14px;
    }

    .viaje-resumen {
      background: white;
      border-radius: 20px;
      padding: 18px;
      margin: 16px 0;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
      border-left: 7px solid #ff9f1c;
      cursor: pointer;
    }

    .viaje-resumen h2 {
      margin: 0 0 8px;
      color: #082f5f;
      font-size: 21px;
    }

    .viaje-resumen p {
      margin: 5px 0;
      color: #475569;
      font-weight: bold;
      font-size: 14px;
    }

    .indicador {
      float: right;
      font-size: 25px;
      color: #ff9f1c;
      font-weight: bold;
    }

    .viaje-detalle {
      display: none;
    }

    .viaje-detalle.abierto {
      display: block;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 20px;
      margin: 14px 0 22px;
      box-shadow: 0 14px 35px rgba(0,0,0,0.25);
      border-top: 7px solid #00509d;
    }

    .info-viaje {
      background: #eef6ff;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 16px;
      text-align: center;
    }

    .info-viaje strong {
      color: #082f5f;
      font-size: 19px;
    }

    .datos {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      margin-top: 12px;
    }

    .dato {
      background: #f1f7ff;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      font-size: 13px;
      color: #0f3057;
      font-weight: bold;
    }

    .gps-panel {
      background: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      padding: 15px;
      margin: 14px 0 18px;
    }

    .gps-panel h3 {
      text-align: center;
      color: #082f5f;
      margin: 0 0 10px;
    }

    .gps-estado {
      text-align: center;
      padding: 10px;
      border-radius: 13px;
      font-weight: bold;
      margin-bottom: 10px;
      background: #e2e8f0;
      color: #334155;
      font-size: 14px;
    }

    .gps-activo {
      background: #dcfce7;
      color: #14532d;
      border: 1px solid #22c55e;
    }

    .gps-inactivo {
      background: #fee2e2;
      color: #7f1d1d;
      border: 1px solid #ef4444;
    }

    .gps-botones {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .btn-iniciar {
      background: linear-gradient(135deg, #0077ff, #004fbd);
    }

    .btn-finalizar {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
    }

    .gps-nota {
      color: #64748b;
      font-size: 12px;
      text-align: center;
      margin: 10px 0 0;
    }

    .pasajeros-titulo {
      text-align: center;
      color: #082f5f;
      margin: 14px 0;
    }

    .pasajero {
      background: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: 16px;
      padding: 15px;
      margin: 12px 0;
    }

    .pasajero strong {
      color: #082f5f;
      font-size: 17px;
    }

    .pasajero p {
      margin: 6px 0;
      font-size: 14px;
      color: #334155;
    }

    .estado {
      display: inline-block;
      margin-top: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }

    .pendiente {
      background: #fef3c7;
      color: #92400e;
    }

    .abordo {
      background: #dcfce7;
      color: #14532d;
    }

    button {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      border: none;
      border-radius: 13px;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #15803d);
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .btn-pendiente {
      background: linear-gradient(135deg, #f59e0b, #d97706);
    }

    .vacio {
      text-align: center;
      color: #64748b;
      font-size: 14px;
      padding: 12px;
    }

    .resumen-cupos {
      margin-top: 14px;
      background: #dcfce7;
      border: 1px solid #22c55e;
      color: #14532d;
      padding: 12px;
      border-radius: 14px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Panel del Conductor</h1>
  <p>Revisa los viajes, pasajeros y comparte tu ubicación.</p>
</div>

<div class="contenedor">
  <div id="viajes"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-config.js"></script>

<script>
const CAPACIDAD = 4;

let gpsWatchId = null;
let viajeGpsActivo = null;
let gpsListeners = {};

db.collection("viajes").orderBy("creado", "desc").onSnapshot(snapshot => {
  const cont = document.getElementById("viajes");
  cont.innerHTML = "";

  if (snapshot.empty) {
    cont.innerHTML = `
      <div class="card">
        <p class="vacio">No hay viajes creados todavía.</p>
      </div>
    `;
    return;
  }

  snapshot.forEach(doc => {
    const v = doc.data();
    const viajeId = doc.id;

    cont.innerHTML += `
      <div class="viaje-resumen" onclick="toggleViaje('${viajeId}')">
        <span class="indicador" id="indicador-${viajeId}">+</span>
        <h2>${v.origen} → ${v.destino}</h2>
        <p>📅 ${v.fecha}</p>
        <p>🕒 ${v.hora}</p>
        <p>👤 ${v.conductor || "Conductor no asignado"}</p>
      </div>

      <div class="viaje-detalle" id="detalle-${viajeId}">
        <div class="card">
          <div class="info-viaje">
            <strong>${v.origen} → ${v.destino}</strong>

            <div class="datos">
              <div class="dato">📅 ${v.fecha}</div>
              <div class="dato">🕒 ${v.hora}</div>
              <div class="dato">👤 ${v.conductor || "Sin conductor"}</div>
              <div class="dato">🚘 ${v.vehiculo || "Sin vehículo"}</div>
            </div>
          </div>

          <div class="gps-panel">
            <h3>Seguimiento GPS</h3>

            <div class="gps-estado" id="gps-estado-${viajeId}">
              Estado: sin iniciar
            </div>

            <div class="gps-botones">
              <button class="btn-iniciar" id="btn-iniciar-${viajeId}" onclick="iniciarViaje(event, '${viajeId}')">
                Iniciar viaje
              </button>

              <button class="btn-finalizar" id="btn-finalizar-${viajeId}" onclick="finalizarViaje(event, '${viajeId}')">
                Finalizar viaje
              </button>
            </div>

            <p class="gps-nota">
              Mantén esta página abierta para compartir la ubicación en tiempo real.
            </p>
          </div>

          <div id="pasajeros-${viajeId}">
            <p class="vacio">Cargando pasajeros...</p>
          </div>
        </div>
      </div>
    `;

    cargarPasajeros(viajeId);
    escucharEstadoGPS(viajeId);
  });
});

function cargarPasajeros(viajeId) {
  db.collection("reservas")
    .where("viajeId", "==", viajeId)
    .onSnapshot(snapshot => {
      let html = `<h3 class="pasajeros-titulo">Pasajeros</h3>`;
      let cuposTotales = 0;

      if (snapshot.empty) {
        html += `<p class="vacio">No hay pasajeros registrados aún.</p>`;
      }

      snapshot.forEach(doc => {
        const r = doc.data();
        const estado = r.estadoAbordaje || "pendiente";
        const cupos = Number(r.cupos || 1);
        cuposTotales += cupos;

        html += `
          <div class="pasajero">
            <strong>${r.nombre}</strong>
            <p>📱 ${r.telefono || "Sin teléfono"}</p>
            <p>📍 Subida: ${r.abordaje || "No indicada"}</p>
            <p>👥 Pasajeros: ${cupos}</p>
            <p>💰 Total: $${r.precioTotal || 0}</p>

            <span class="estado ${estado}">
              ${estado === "abordo" ? "Abordó" : "Pendiente"}
            </span>

            ${
              estado === "abordo"
              ? `<button class="btn-pendiente" onclick="marcarPendiente('${doc.id}')">Marcar pendiente</button>`
              : `<button onclick="marcarAbordo('${doc.id}')">Marcar abordó</button>`
            }
          </div>
        `;
      });

      html += `
        <div class="resumen-cupos">
          Cupos ocupados: ${cuposTotales} de ${CAPACIDAD}
        </div>
      `;

      const cont = document.getElementById(`pasajeros-${viajeId}`);
      if (cont) cont.innerHTML = html;
    });
}

function escucharEstadoGPS(viajeId) {
  if (gpsListeners[viajeId]) return;

  gpsListeners[viajeId] = db.collection("gps").doc(viajeId).onSnapshot(doc => {
    const estado = document.getElementById(`gps-estado-${viajeId}`);
    const btnIniciar = document.getElementById(`btn-iniciar-${viajeId}`);
    const btnFinalizar = document.getElementById(`btn-finalizar-${viajeId}`);

    if (!estado || !btnIniciar || !btnFinalizar) return;

    if (!doc.exists || !doc.data().enViaje) {
      estado.className = "gps-estado gps-inactivo";
      estado.innerText = "Estado: viaje sin seguimiento activo";
      btnIniciar.disabled = false;
      btnFinalizar.disabled = false;
      return;
    }

    const data = doc.data();

    estado.className = "gps-estado gps-activo";
    estado.innerText = "🟢 Viaje en curso · GPS compartiendo ubicación";

    btnIniciar.disabled = true;
    btnFinalizar.disabled = false;
  });
}

function iniciarViaje(event, viajeId) {
  event.stopPropagation();

  if (!navigator.geolocation) {
    alert("Este celular o navegador no permite usar GPS.");
    return;
  }

  if (gpsWatchId !== null && viajeGpsActivo && viajeGpsActivo !== viajeId) {
    alert("Ya hay otro viaje compartiendo ubicación en este celular. Finalízalo antes de iniciar otro.");
    return;
  }

  const btn = document.getElementById(`btn-iniciar-${viajeId}`);
  const estado = document.getElementById(`gps-estado-${viajeId}`);

  if (btn) {
    btn.disabled = true;
    btn.innerText = "Solicitando GPS...";
  }

  if (estado) {
    estado.className = "gps-estado";
    estado.innerText = "Solicitando permiso de ubicación...";
  }

  gpsWatchId = navigator.geolocation.watchPosition(
    position => {
      viajeGpsActivo = viajeId;

      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const precision = position.coords.accuracy;

      db.collection("gps").doc(viajeId).set({
        viajeId,
        lat,
        lng,
        precision,
        enViaje: true,
        actualizado: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });

      if (btn) {
        btn.innerText = "Viaje iniciado";
      }
    },
    error => {
      console.error(error);

      let mensaje = "No se pudo obtener la ubicación.";

      if (error.code === 1) {
        mensaje = "Debes permitir el acceso a la ubicación para iniciar el viaje.";
      }

      alert(mensaje);

      gpsWatchId = null;
      viajeGpsActivo = null;

      if (btn) {
        btn.disabled = false;
        btn.innerText = "Iniciar viaje";
      }

      if (estado) {
        estado.className = "gps-estado gps-inactivo";
        estado.innerText = "Estado: GPS no iniciado";
      }
    },
    {
      enableHighAccuracy: true,
      maximumAge: 5000,
      timeout: 15000
    }
  );
}

function finalizarViaje(event, viajeId) {
  event.stopPropagation();

  const confirmar = confirm("¿Seguro que quieres finalizar el seguimiento GPS de este viaje?");
  if (!confirmar) return;

  if (gpsWatchId !== null && viajeGpsActivo === viajeId) {
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
    viajeGpsActivo = null;
  }

  db.collection("gps").doc(viajeId).set({
    viajeId,
    enViaje: false,
    finalizado: firebase.firestore.FieldValue.serverTimestamp(),
    actualizado: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true })
  .then(() => {
    const btn = document.getElementById(`btn-iniciar-${viajeId}`);
    if (btn) {
      btn.disabled = false;
      btn.innerText = "Iniciar viaje";
    }

    alert("Seguimiento GPS finalizado.");
  })
  .catch(error => {
    console.error(error);
    alert("No se pudo finalizar el viaje.");
  });
}

function toggleViaje(viajeId) {
  const detalle = document.getElementById(`detalle-${viajeId}`);
  const indicador = document.getElementById(`indicador-${viajeId}`);

  if (!detalle) return;

  detalle.classList.toggle("abierto");
  indicador.innerText = detalle.classList.contains("abierto") ? "−" : "+";
}

function marcarAbordo(reservaId) {
  db.collection("reservas").doc(reservaId).update({
    estadoAbordaje: "abordo"
  });
}

function marcarPendiente(reservaId) {
  db.collection("reservas").doc(reservaId).update({
    estadoAbordaje: "pendiente"
  });
}
</script>

</body>
</html>
