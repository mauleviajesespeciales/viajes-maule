<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Viajes Especiales Maule</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #061a33;
      color: #111827;
    }

    .hero {
      min-height: 360px;
      padding: 55px 20px 110px;
      text-align: center;
      color: white;
      background:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.45)),
        linear-gradient(135deg, #002b5b, #00509d, #ff9f1c);
      border-bottom-left-radius: 45px;
      border-bottom-right-radius: 45px;
    }

    .hero h1 {
      font-size: 48px;
      margin: 0 0 12px;
    }

    .hero p {
      font-size: 20px;
      margin: 8px 0;
    }

    .hero span {
      display: inline-block;
      margin-top: 18px;
      padding: 11px 20px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.35);
      font-weight: bold;
    }

    .contenedor {
      max-width: 1050px;
      margin: -80px auto 45px;
      padding: 0 18px;
    }

    .titulo-seccion {
      color: white;
      text-align: center;
      font-size: 32px;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      border-radius: 26px;
      padding: 28px;
      margin: 22px 0;
      box-shadow: 0 18px 45px rgba(0,0,0,0.22);
    }

    .viaje-card {
      border-top: 8px solid #ff9f1c;
    }

    .ruta {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 18px;
      background: linear-gradient(135deg, #f8fbff, #e8f2ff);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }

    .ruta span {
      color: #64748b;
      font-size: 13px;
      text-transform: uppercase;
      font-weight: bold;
    }

    .ruta h2 {
      color: #082f5f;
      font-size: 33px;
      margin: 8px 0 0;
    }

    .flecha {
      background: #ff9f1c;
      color: white;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 32px;
      font-weight: bold;
    }

    .datos-viaje {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 22px 0;
    }

    .datos-viaje p {
      background: #eef6ff;
      color: #0f3057;
      border-radius: 16px;
      padding: 16px 10px;
      margin: 0;
      text-align: center;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #0077ff, #004fbd);
    }

    .btn-secundario {
      background: linear-gradient(135deg, #ff9f1c, #ff6b00);
    }

    .zona-asientos {
      margin-top: 25px;
      padding: 24px;
      background: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: 22px;
    }

    .zona-asientos h3,
    .leyenda {
      text-align: center;
    }

    .leyenda {
      color: #64748b;
      font-size: 14px;
    }

    .conductor-box {
      width: 180px;
      margin: 18px auto;
      padding: 13px;
      background: #111827;
      color: white;
      text-align: center;
      border-radius: 14px;
      font-weight: bold;
    }

    .asientos {
      max-width: 420px;
      margin: 0 auto 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .asiento {
      padding: 18px;
      border-radius: 14px;
      text-align: center;
      font-weight: bold;
      cursor: pointer;
    }

    .disponible {
      background: #dcfce7;
      border: 2px solid #22c55e;
    }

    .ocupado {
      background: #fee2e2;
      border: 2px solid #ef4444;
      cursor: not-allowed;
    }

    .seleccionado {
      background: #fef3c7;
      border: 2px solid #f59e0b;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
    }

    @media (max-width: 700px) {
      .hero h1 {
        font-size: 34px;
      }

      .ruta {
        grid-template-columns: 1fr;
      }

      .datos-viaje {
        grid-template-columns: repeat(2, 1fr);
      }

      .contenedor {
        margin-top: -65px;
      }
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Viajes Especiales Maule</h1>
  <p>Reserva tu pasaje o asegura una minivan completa para tu próximo viaje.</p>
  <span>Traslados cómodos, seguros y organizados</span>
</div>

<div class="contenedor">
  <h2 class="titulo-seccion">Viajes disponibles</h2>
  <div id="viajes"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-config.js"></script>

<script>
let asientoSeleccionado = null;

db.collection("viajes")
  .where("estado", "==", "activo")
  .onSnapshot(snapshot => {
    const cont = document.getElementById("viajes");
    cont.innerHTML = "";

    if (snapshot.empty) {
      cont.innerHTML = `
        <div class="card viaje-card">
          <h3>No hay viajes disponibles por ahora</h3>
          <p>Vuelve a revisar más tarde.</p>
        </div>
      `;
      return;
    }

    snapshot.forEach(doc => {
      const v = doc.data();

      cont.innerHTML += `
        <div class="card viaje-card">
          <div class="ruta">
            <div>
              <span>Origen</span>
              <h2>${v.origen}</h2>
            </div>
            <div class="flecha">→</div>
            <div>
              <span>Destino</span>
              <h2>${v.destino}</h2>
            </div>
          </div>

          <div class="datos-viaje">
            <p>📅 ${v.fecha}</p>
            <p>🕒 ${v.hora}</p>
            <p>💺 12 asientos</p>
            <p>💰 $${v.precioAsiento}</p>
          </div>

          <button onclick="mostrarAsientos('${doc.id}', ${v.precioAsiento})">
            Comprar pasaje
          </button>

          <button class="btn-secundario" onclick="reservarCompleto('${doc.id}')">
            Reservar minivan completa
          </button>

          <div id="asientos-${doc.id}"></div>
        </div>
      `;
    });
  });

function mostrarAsientos(viajeId, precio) {
  asientoSeleccionado = null;

  db.collection("reservas")
    .where("viajeId", "==", viajeId)
    .get()
    .then(snapshot => {
      const ocupados = [];

      snapshot.forEach(doc => {
        const r = doc.data();
        if (r.asiento) ocupados.push(r.asiento);
      });

      let html = `
        <div class="zona-asientos">
          <h3>Selecciona tu asiento</h3>
          <p class="leyenda">Verde disponible · Rojo ocupado · Amarillo seleccionado</p>

          <div class="conductor-box">Conductor</div>

          <div class="asientos">
      `;

      for (let i = 1; i <= 12; i++) {
        const ocupado = ocupados.includes(i);
        html += `
          <div 
            class="asiento ${ocupado ? "ocupado" : "disponible"}"
            onclick="${ocupado ? "" : `seleccionarAsiento('${viajeId}', ${i})`}"
            id="asiento-${viajeId}-${i}">
            ${i}
          </div>
        `;
      }

      html += `
          </div>

          <input id="nombre-${viajeId}" placeholder="Nombre pasajero">
          <input id="telefono-${viajeId}" placeholder="Teléfono WhatsApp">

          <button onclick="confirmarReserva('${viajeId}', ${precio})">
            Confirmar reserva
          </button>
        </div>
      `;

      document.getElementById(`asientos-${viajeId}`).innerHTML = html;
    });
}

function seleccionarAsiento(viajeId, asiento) {
  asientoSeleccionado = asiento;

  for (let i = 1; i <= 12; i++) {
    const el = document.getElementById(`asiento-${viajeId}-${i}`);
    if (el && el.classList.contains("disponible")) {
      el.classList.remove("seleccionado");
    }
  }

  document.getElementById(`asiento-${viajeId}-${asiento}`).classList.add("seleccionado");
}

function confirmarReserva(viajeId, precio) {
  const nombre = document.getElementById(`nombre-${viajeId}`).value;
  const telefono = document.getElementById(`telefono-${viajeId}`).value;

  if (!asientoSeleccionado) {
    alert("Selecciona un asiento");
    return;
  }

  if (!nombre || !telefono) {
    alert("Completa nombre y teléfono");
    return;
  }

  db.collection("reservas").add({
    viajeId,
    nombre,
    telefono,
    asiento: asientoSeleccionado,
    tipo: "pasaje",
    precio,
    pagado: false,
    estadoAbordaje: "pendiente",
    creado: new Date()
  }).then(() => {
    alert("Reserva realizada correctamente");
    location.reload();
  });
}

function reservarCompleto(viajeId) {
  const nombre = prompt("Nombre de quien reserva la minivan completa:");
  const telefono = prompt("Teléfono WhatsApp:");

  if (!nombre || !telefono) return;

  db.collection("reservas").add({
    viajeId,
    nombre,
    telefono,
    tipo: "minivan_completa",
    precio: 0,
    pagado: false,
    estadoAbordaje: "pendiente",
    creado: new Date()
  }).then(() => {
    db.collection("viajes").doc(viajeId).update({
      estado: "reservado_completo"
    });

    alert("Minivan completa reservada");
    location.reload();
  });
}
</script>

</body>
</html>
