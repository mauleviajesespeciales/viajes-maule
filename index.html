<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Viajes Especiales Maule</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #061a33;
      color: #111827;
    }

    .hero {
      padding: 55px 20px 105px;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #002b5b, #00509d, #ff9f1c);
      border-bottom-left-radius: 45px;
      border-bottom-right-radius: 45px;
    }

    .hero h1 {
      font-size: 44px;
      margin: 0 0 12px;
    }

    .hero p {
      font-size: 19px;
      margin: 8px 0;
    }

    .hero span {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      font-weight: bold;
    }

    .contenedor {
      max-width: 1000px;
      margin: -75px auto 45px;
      padding: 0 18px;
    }

    .titulo-seccion {
      color: white;
      text-align: center;
      font-size: 30px;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      border-radius: 26px;
      padding: 28px;
      margin: 22px 0;
      box-shadow: 0 18px 45px rgba(0,0,0,0.22);
      border-top: 8px solid #ff9f1c;
    }

    .ruta {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 18px;
      background: #eef6ff;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
    }

    .ruta span {
      color: #64748b;
      font-size: 13px;
      text-transform: uppercase;
      font-weight: bold;
    }

    .ruta h2 {
      color: #082f5f;
      font-size: 31px;
      margin: 8px 0 0;
    }

    .flecha {
      background: #ff9f1c;
      color: white;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 30px;
      font-weight: bold;
    }

    .datos-viaje {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 22px 0;
    }

    .dato {
      background: #f1f7ff;
      border-radius: 16px;
      padding: 15px 10px;
      text-align: center;
      font-weight: bold;
      color: #0f3057;
    }

    .cupos-box {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border: 2px solid #22c55e;
      border-radius: 18px;
      padding: 18px;
      text-align: center;
      margin: 18px 0;
      color: #14532d;
      font-weight: bold;
      font-size: 18px;
    }

    .formulario {
      margin-top: 20px;
      background: #f8fbff;
      border-radius: 20px;
      padding: 22px;
      border: 1px solid #dbeafe;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0 0;
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #0077ff, #004fbd);
    }

    button:hover {
      filter: brightness(1.05);
    }

    .sin-cupos {
      background: #fee2e2;
      border: 2px solid #ef4444;
      color: #7f1d1d;
    }

    @media (max-width: 700px) {
      .hero h1 {
        font-size: 33px;
      }

      .ruta {
        grid-template-columns: 1fr;
      }

      .datos-viaje {
        grid-template-columns: repeat(2, 1fr);
      }

      .contenedor {
        margin-top: -65px;
      }
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Viajes Especiales Maule</h1>
  <p>Reserva tu cupo para viajar cómodo y seguro.</p>
  <span>Traslados especiales en auto para 4 pasajeros</span>
</div>

<div class="contenedor">
  <h2 class="titulo-seccion">Viajes disponibles</h2>
  <div id="viajes"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-config.js"></script>

<script>
const CAPACIDAD = 4;

db.collection("viajes")
  .where("estado", "==", "activo")
  .onSnapshot(snapshot => {
    const cont = document.getElementById("viajes");
    cont.innerHTML = "";

    if (snapshot.empty) {
      cont.innerHTML = `
        <div class="card">
          <h3>No hay viajes disponibles por ahora</h3>
          <p>Vuelve a revisar más tarde.</p>
        </div>
      `;
      return;
    }

    snapshot.forEach(doc => {
      const viajeId = doc.id;
      const v = doc.data();
      cargarViajeConCupos(viajeId, v);
    });
  });

function cargarViajeConCupos(viajeId, v) {
  db.collection("reservas")
    .where("viajeId", "==", viajeId)
    .get()
    .then(snapshot => {
      let cuposVendidos = 0;

      snapshot.forEach(doc => {
        const r = doc.data();
        cuposVendidos += Number(r.cupos || 0);
      });

      const disponibles = CAPACIDAD - cuposVendidos;
      const precio = Number(v.precioAsiento || 0);

      let opciones = "";
      for (let i = 1; i <= disponibles; i++) {
        opciones += `<option value="${i}">${i} pasajero${i > 1 ? "s" : ""}</option>`;
      }

      const bloqueFormulario = disponibles > 0 ? `
        <div class="formulario">
          <h3>Reservar cupos</h3>

          <label>Cantidad de pasajeros</label>
          <select id="cupos-${viajeId}">
            ${opciones}
          </select>

          <input id="nombre-${viajeId}" placeholder="Nombre de quien reserva">
          <input id="telefono-${viajeId}" placeholder="Teléfono WhatsApp">

          <button onclick="confirmarReserva('${viajeId}', ${precio})">
            Confirmar reserva
          </button>
        </div>
      ` : `
        <div class="cupos-box sin-cupos">
          Viaje completo
        </div>
      `;

      document.getElementById("viajes").innerHTML += `
        <div class="card">
          <div class="ruta">
            <div>
              <span>Origen</span>
              <h2>${v.origen}</h2>
            </div>
            <div class="flecha">→</div>
            <div>
              <span>Destino</span>
              <h2>${v.destino}</h2>
            </div>
          </div>

          <div class="datos-viaje">
            <div class="dato">📅 ${v.fecha}</div>
            <div class="dato">🕒 ${v.hora}</div>
            <div class="dato">🚗 4 pasajeros</div>
            <div class="dato">💰 $${precio}</div>
          </div>

          <div class="cupos-box ${disponibles <= 0 ? "sin-cupos" : ""}">
            Cupos disponibles: ${disponibles} de ${CAPACIDAD}
          </div>

          ${bloqueFormulario}
        </div>
      `;
    });
}

function confirmarReserva(viajeId, precioUnitario) {
  const cupos = Number(document.getElementById(`cupos-${viajeId}`).value);
  const nombre = document.getElementById(`nombre-${viajeId}`).value;
  const telefono = document.getElementById(`telefono-${viajeId}`).value;

  if (!nombre || !telefono) {
    alert("Completa nombre y teléfono");
    return;
  }

  db.collection("reservas")
    .where("viajeId", "==", viajeId)
    .get()
    .then(snapshot => {
      let cuposVendidos = 0;

      snapshot.forEach(doc => {
        const r = doc.data();
        cuposVendidos += Number(r.cupos || 0);
      });

      const disponibles = CAPACIDAD - cuposVendidos;

      if (cupos > disponibles) {
        alert("Ya no quedan suficientes cupos disponibles");
        location.reload();
        return;
      }

      db.collection("reservas").add({
        viajeId,
        nombre,
        telefono,
        cupos,
        tipo: cupos === CAPACIDAD ? "auto_completo" : "pasaje",
        precioUnitario,
        precioTotal: precioUnitario * cupos,
        pagado: false,
        estadoAbordaje: "pendiente",
        creado: new Date()
      }).then(() => {
        alert("Reserva realizada correctamente");
        location.reload();
      });
    });
}
</script>

</body>
</html>
